# Tiny Tapeout project information
project:
  title:        "Mini PSG"                                        # Project title
  author:       "Peter Szentkuti"                                 # Author
  discord:      ""      
  description:  "Retro inspired SPI programmable sound generator" # Short description   
  language:     "Verilog"                                         # Source language
  clock_hz:     25000000                                          # Clock in Hz

  # Tiny Tapeout tile allocation 
  # A single tile is about 167x108 uM.
  tiles: "1x1" # Single tile

  # Top level Tiny Tapeout wrapper
  top_module:  "tt_um_zettpe_mini_psg"

  # Project sources
  source_files:
    - "tt_um_zettpe_mini_psg.v"
    - "mini_psg_top.v"
    - "mini_psg_control_top.v"
    - "mini_psg_audio_top.v"
    - "mini_psg_audio_generator_top.v"
    - "mini_psg_audio_output_top.v"
    - "spi_slave.v"
    - "register_file.v"
    - "note_lut.v"
    - "phase_accumulator.v"
    - "waveform_generator.v"
    - "envelope_generator.v"
    - "volume_control.v"
    - "mixer.v"
    - "dac_1bit.v"

# Project pinout
pinout:
  # Inputs
  ui[0]: "HARD_MUTE"
  ui[1]: ""
  ui[2]: ""
  ui[3]: ""
  ui[4]: ""
  ui[5]: ""
  ui[6]: ""
  ui[7]: ""

  # Outputs
  uo[0]: ""
  uo[1]: ""
  uo[2]: ""
  uo[3]: ""
  uo[4]: ""
  uo[5]: ""
  uo[6]: ""
  uo[7]: "AUDIO"

  # Bidirectional pins
  uio[0]: "SPI_CS_N"
  uio[1]: "SPI_MOSI"
  uio[2]: "SPI_SCK"
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Do not change!
yaml_version: 6
